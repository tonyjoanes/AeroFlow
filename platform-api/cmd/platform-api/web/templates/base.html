<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroFlow Platform — {{block "title" .}}{{end}}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 52px;
    }
    nav .brand { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; }
    nav .brand span { color: var(--accent); }
    nav a { color: var(--muted); font-size: 13px; }
    nav a:hover { color: var(--text); text-decoration: none; }

    main { padding: 32px 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-green  { background: rgba(52,211,153,.15); color: var(--green); }
    .badge-red    { background: rgba(248,113,113,.15); color: var(--red); }
    .badge-yellow { background: rgba(251,191,36,.15);  color: var(--yellow); }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-green  { background: var(--green); }
    .dot-red    { background: var(--red); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stat { text-align: center; padding: 16px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Aero<span>Flow</span></span>
    <a href="/">Services</a>
    <a href="/flights">Flight Board</a>
    <a href="/events">Live Events</a>
  </nav>
  <main>
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
