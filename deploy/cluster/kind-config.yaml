# kind cluster config for AeroFlow.
# Create with: kind create cluster --name aeroflow --config deploy/cluster/kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    extraPortMappings:
      # Expose flight-service's NodePort for local curl access.
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
