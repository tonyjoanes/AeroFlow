apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: notifications
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":8086"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: notifications
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: aeroflow/notification-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: notification-service-config
          ports:
            - name: http
              containerPort: 8086
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: notifications
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8086
      targetPort: http
