# Helm values for Grafana Tempo (single-binary mode).
# Install with:
#   helm install tempo grafana/tempo \
#     --namespace platform --values deploy/observability/tempo-values.yaml

tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"
