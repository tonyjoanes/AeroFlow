# ServiceMonitor resources tell Prometheus where to scrape /metrics on each
# AeroFlow service. One monitor per namespace; Prometheus discovers them all
# because serviceMonitorSelector is set to {} in the Helm values.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flights
  namespace: flights
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: flight-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
