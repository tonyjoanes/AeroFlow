apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-service-config
  namespace: flights
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: flights
  labels:
    app: flight-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      containers:
        - name: flight-service
          image: aeroflow/flight-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: flight-service-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: flights
spec:
  selector:
    app: flight-service
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# NodePort so the kind cluster's hostPort mapping (see kind-config.yaml) can
# reach the API for local curl testing without setting up ingress yet.
apiVersion: v1
kind: Service
metadata:
  name: flight-service-nodeport
  namespace: flights
spec:
  type: NodePort
  selector:
    app: flight-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
