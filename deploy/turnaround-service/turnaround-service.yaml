apiVersion: v1
kind: ConfigMap
metadata:
  name: turnaround-service-config
  namespace: ground-ops
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":8084"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turnaround-service
  namespace: ground-ops
  labels:
    app: turnaround-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turnaround-service
  template:
    metadata:
      labels:
        app: turnaround-service
    spec:
      containers:
        - name: turnaround-service
          image: aeroflow/turnaround-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: turnaround-service-config
          ports:
            - name: http
              containerPort: 8084
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: turnaround-service
  namespace: ground-ops
spec:
  selector:
    app: turnaround-service
  ports:
    - name: http
      port: 8084
      targetPort: http
