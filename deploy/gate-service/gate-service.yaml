apiVersion: v1
kind: ConfigMap
metadata:
  name: gate-service-config
  namespace: gates
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate-service
  namespace: gates
  labels:
    app: gate-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gate-service
  template:
    metadata:
      labels:
        app: gate-service
    spec:
      containers:
        - name: gate-service
          image: aeroflow/gate-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: gate-service-config
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gate-service
  namespace: gates
spec:
  selector:
    app: gate-service
  ports:
    - name: http
      port: 8081
      targetPort: http
