apiVersion: v1
kind: ConfigMap
metadata:
  name: baggage-service-config
  namespace: baggage
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baggage-service
  namespace: baggage
  labels:
    app: baggage-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baggage-service
  template:
    metadata:
      labels:
        app: baggage-service
    spec:
      containers:
        - name: baggage-service
          image: aeroflow/baggage-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: baggage-service-config
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: baggage-service
  namespace: baggage
spec:
  selector:
    app: baggage-service
  ports:
    - name: http
      port: 8082
      targetPort: http
