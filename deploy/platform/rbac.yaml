# Least-privilege RBAC for platform-api. It needs read access to deployments
# and pods across all AeroFlow namespaces, plus patch on deployments for
# the rollout endpoint. A ClusterRole is used so one binding covers all
# namespaces without listing them individually.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-api
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-api
subjects:
  - kind: ServiceAccount
    name: platform-api
    namespace: platform
roleRef:
  kind: ClusterRole
  name: platform-api
  apiGroup: rbac.authorization.k8s.io
