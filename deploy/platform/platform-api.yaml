apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-api-config
  namespace: platform
data:
  NATS_URL: "nats://nats.platform.svc.cluster.local:4222"
  HTTP_ADDR: ":9000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: platform
  labels:
    app: platform-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      containers:
        - name: platform-api
          image: aeroflow/platform-api:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: platform-api-config
          ports:
            - name: http
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: platform
spec:
  selector:
    app: platform-api
  ports:
    - name: http
      port: 9000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api-nodeport
  namespace: platform
spec:
  type: NodePort
  selector:
    app: platform-api
  ports:
    - name: http
      port: 9000
      targetPort: http
      nodePort: 30090
